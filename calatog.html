<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Каталог ритуальных товаров похоронного дома «Душа». Гробы, памятники, венки и всё необходимое." />
    <title>Каталог | Похоронный дом «Душа»</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ---- ГЛОБАЛЬНЫЕ СТИЛИ ---- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0c1322, #03060c);
            color: #f0f2f5;
            line-height: 1.5;
            scroll-behavior: smooth;
            overflow-x: hidden;
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(115deg, rgba(255, 255, 255, 0.02) 0%, rgba(220, 240, 255, 0.05) 25%, rgba(255, 255, 245, 0.08) 50%, rgba(210, 230, 255, 0.03) 75%, rgba(255, 255, 255, 0) 100%);
            background-size: 200% 200%;
            pointer-events: none;
            z-index: 1;
            animation: liquidFlow 14s ease infinite;
        }
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 40% 60%, rgba(180, 210, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
            animation: slowPulse 18s infinite alternate;
        }
        @keyframes liquidFlow {
            0% {
                background-position: 0% 0%;
                opacity: 0.4;
            }
            50% {
                background-position: 100% 100%;
                opacity: 0.8;
            }
            100% {
                background-position: 0% 0%;
                opacity: 0.4;
            }
        }
        @keyframes slowPulse {
            0% {
                opacity: 0.2;
                transform: scale(1);
            }
            100% {
                opacity: 0.6;
                transform: scale(1.05);
            }
        }

        .glass-card {
            background: rgba(20, 28, 40, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: transform 0.25s ease, box-shadow 0.3s ease, background 0.3s;
        }
        .glass-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 28px 40px -16px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.35);
            background: rgba(25, 35, 50, 0.65);
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 3;
        }

        /* ---- HEADER ---- */
        .header {
            padding: 1.25rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(8, 12, 20, 0.65);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 240, 0.12);
        }
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .logo img {
            height: 50px;
            width: auto;
            max-width: 180px;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }
        .logo-text {
            background: linear-gradient(135deg, #FFFFFF, #cbd5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: #eef3ff;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            transition: 0.2s;
            border-bottom: 1px solid transparent;
            padding-bottom: 4px;
        }
        .nav-links a:hover,
        .nav-links a.active {
            border-bottom-color: #c7ddff;
            color: white;
            text-shadow: 0 0 4px rgba(255, 255, 240, 0.5);
        }

        /* ---- ХЛЕБНЫЕ КРОШКИ ---- */
        .breadcrumbs {
            padding: 1.5rem 0 0.5rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .breadcrumbs a {
            color: #b0c8ff;
            text-decoration: none;
        }
        .breadcrumbs span {
            color: #d0ddff;
        }

        /* ---- ОСНОВНАЯ СЕТКА КАТАЛОГА ---- */
        .catalog-layout {
            display: flex;
            gap: 2rem;
            padding: 1.5rem 0 3rem;
            align-items: flex-start;
        }

        /* ---- САЙДБАР ФИЛЬТРОВ ---- */
        .filters-sidebar {
            flex: 0 0 280px;
            position: sticky;
            top: 100px;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            padding: 1.5rem;
            background: rgba(10, 16, 26, 0.6);
            backdrop-filter: blur(14px);
            border-radius: 1.8rem;
            border: 1px solid rgba(255, 255, 240, 0.12);
        }
        .filters-sidebar h3 {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .filter-group {
            margin-bottom: 1.8rem;
        }
        .filter-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .filter-group select,
        .filter-group input[type="number"] {
            width: 100%;
            padding: 0.6rem 1rem;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }
        .filter-group select:focus,
        .filter-group input:focus {
            border-color: #8ab0ff;
            background: rgba(255, 255, 255, 0.14);
        }
        .filter-group select option {
            background: #1a253a;
            color: white;
        }
        .price-range {
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }
        .price-range input {
            width: 100%;
            padding: 0.5rem 0.8rem;
        }
        .price-range span {
            opacity: 0.6;
        }
        .filter-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        .filter-actions .btn {
            flex: 1;
            justify-content: center;
            padding: 0.7rem 1rem;
            font-size: 0.9rem;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        /* ---- ПАНЕЛЬ УПРАВЛЕНИЯ ---- */
        .catalog-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }
        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .toolbar-left select {
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
        }
        .toolbar-left select option {
            background: #1a253a;
        }
        .toolbar-right {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }
        .view-toggle {
            display: flex;
            gap: 0.4rem;
        }
        .view-toggle button {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #b0c8ff;
            padding: 0.4rem 0.7rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }
        .view-toggle button.active {
            background: rgba(255, 255, 255, 0.15);
            border-color: #8ab0ff;
            color: white;
        }
        .view-toggle button:hover {
            background: rgba(255, 255, 255, 0.12);
        }
        .found-count {
            opacity: 0.7;
            font-size: 0.9rem;
        }

        /* ---- СЕТКА ТОВАРОВ ---- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.8rem;
            flex: 1;
        }
        .products-grid.list-view {
            grid-template-columns: 1fr;
        }
        .product-card {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.25s;
            cursor: default;
            position: relative;
        }
        .product-card .icon-wrap {
            font-size: 3.5rem;
            color: #bdd4ff;
            margin-bottom: 0.8rem;
            opacity: 0.9;
        }
        .product-card h4 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }
        .product-card .desc {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 0.8rem;
            flex: 1;
        }
        .product-card .price {
            font-size: 1.4rem;
            font-weight: 700;
            color: #d4e4ff;
            margin-bottom: 0.5rem;
        }
        .product-card .btn {
            padding: 0.5rem 1.5rem;
            font-size: 0.85rem;
            background: rgba(100, 130, 200, 0.4);
            border-color: rgba(255, 255, 250, 0.3);
        }
        .product-card .btn:hover {
            background: rgba(100, 130, 200, 0.7);
        }
        /* Плашки */
        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            background: rgba(60, 180, 120, 0.6);
            color: #fff;
        }
        .badge-out-of-stock {
            right: auto;
            left: 10px;
            background: rgba(200, 60, 60, 0.8);
            color: #fff;
        }

        /* ---- ПАГИНАЦИЯ ---- */
        .pagination-wrap {
            display: flex;
            justify-content: center;
            margin-top: 2.5rem;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .pagination-wrap button {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #d0ddff;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            font-size: 0.9rem;
        }
        .pagination-wrap button.active {
            background: rgba(255, 255, 255, 0.18);
            border-color: #8ab0ff;
            color: white;
        }
        .pagination-wrap button:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
        }
        .pagination-wrap button:disabled {
            opacity: 0.3;
            cursor: default;
        }

        /* ---- МОБИЛЬНАЯ КНОПКА ФИЛЬТРОВ ---- */
        .mobile-filter-toggle {
            display: none;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-size: 0.95rem;
            cursor: pointer;
            backdrop-filter: blur(4px);
            margin-bottom: 1rem;
        }
        .mobile-filter-toggle i {
            margin-right: 0.5rem;
        }

        /* ---- АДАПТИВНОСТЬ ---- */
        @media (max-width: 1024px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .filters-sidebar {
                flex: 0 0 240px;
            }
        }
        @media (max-width: 820px) {
            .catalog-layout {
                flex-direction: column;
            }
            .filters-sidebar {
                position: relative;
                top: 0;
                max-height: none;
                width: 100%;
                display: none;
                margin-bottom: 1.5rem;
            }
            .filters-sidebar.open {
                display: block;
            }
            .mobile-filter-toggle {
                display: inline-block;
            }
            .products-grid:not(.list-view) {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 600px) {
            .header-flex {
                flex-direction: column;
            }
            .nav-links {
                justify-content: center;
                gap: 1.3rem;
            }
            .logo-text {
                font-size: 1.5rem;
            }
            .container {
                padding: 0 16px;
            }
            .filters-sidebar {
                padding: 1rem;
            }
            .toolbar-left,
            .toolbar-right {
                width: 100%;
                justify-content: center;
            }
            .catalog-toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .view-toggle {
                justify-content: center;
            }
        }
        @media (max-width: 400px) {
            .products-grid:not(.list-view) {
                grid-template-columns: 1fr;
            }
        }

        /* ---- ОБЩИЕ КНОПКИ ---- */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 245, 0.3);
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 600;
            color: white;
            text-decoration: none;
            transition: 0.25s;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .btn-primary {
            background: rgba(100, 130, 200, 0.55);
            border-color: rgba(255, 255, 250, 0.5);
        }
        .btn-primary:hover {
            background: rgba(120, 150, 220, 0.75);
            transform: scale(1.02);
        }

        /* Стиль для списка (list-view) */
        .products-grid.list-view .product-card {
            flex-direction: row;
            text-align: left;
            align-items: center;
            gap: 1.5rem;
            padding: 1rem 1.5rem;
        }
        .products-grid.list-view .product-card .icon-wrap {
            font-size: 2.5rem;
            margin-bottom: 0;
        }
        .products-grid.list-view .product-card .info {
            flex: 1;
        }
        .products-grid.list-view .product-card .price {
            margin-bottom: 0;
        }
        .products-grid.list-view .product-card .btn {
            flex-shrink: 0;
        }
        @media (max-width: 600px) {
            .products-grid.list-view .product-card {
                flex-direction: column;
                text-align: center;
            }
        }

        /* Стили для скроллбара сайдбара */
        .filters-sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .filters-sidebar::-webkit-scrollbar-track {
            background: transparent;
        }
        .filters-sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        footer {
            padding: 2rem 0;
            border-top: 1px solid rgba(255, 255, 240, 0.15);
            text-align: center;
            font-size: 0.85rem;
            background: rgba(5, 8, 14, 0.5);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="container header-flex">
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="Логотип похоронного дома Душа" onerror="this.style.display='none'" />
                <span class="logo-text">Похоронный дом «Душа»</span>
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="index.html#about">О нас</a></li>
                    <li><a href="index.html#services">Услуги</a></li>
                    <li><a href="catalog.html" class="active">Каталог</a></li>
                    <li><a href="index.html#contact">Контакты</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <!-- Хлебные крошки -->
            <div class="breadcrumbs">
                <a href="index.html">Главная</a> <span>→</span> <span>Каталог</span>
            </div>

            <!-- Мобильная кнопка -->
            <button class="mobile-filter-toggle" id="mobileFilterToggle">
                <i class="fas fa-sliders-h"></i> Фильтры
            </button>

            <div class="catalog-layout">
                <!-- Сайдбар -->
                <aside class="filters-sidebar" id="filtersSidebar">
                    <h3>
                        <span>Фильтры</span>
                        <button class="btn btn-sm btn-outline" id="resetFiltersBtn" style="padding:0.3rem 0.8rem; font-size:0.8rem;">
                            <i class="fas fa-undo"></i> Сброс
                        </button>
                    </h3>

                    <div class="filter-group">
                        <label for="categoryFilter">Категория</label>
                        <select id="categoryFilter">
                            <option value="all">Все категории</option>
                            <option value="гробы">Гробы</option>
                            <option value="памятники">Памятники</option>
                            <option value="венки и цветы">Венки и цветы</option>
                            <option value="кресты и таблички">Кресты и таблички</option>
                            <option value="ритуальные принадлежности">Ритуальные принадлежности</option>
                            <option value="одежда для усопших">Одежда для усопших</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>Цена (от – до)</label>
                        <div class="price-range">
                            <input type="number" id="priceFrom" placeholder="от" min="0" step="100" />
                            <span>–</span>
                            <input type="number" id="priceTo" placeholder="до" min="0" step="100" />
                        </div>
                    </div>

                    <div class="filter-group">
                        <label for="materialFilter">Материал</label>
                        <select id="materialFilter">
                            <option value="all">Любой</option>
                            <option value="дерево">Дерево</option>
                            <option value="металл">Металл</option>
                            <option value="гранит">Гранит</option>
                            <option value="мрамор">Мрамор</option>
                            <option value="искусственные">Искусственные</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label for="sizeFilter">Размер</label>
                        <select id="sizeFilter">
                            <option value="all">Любой</option>
                            <option value="маленький">Маленький</option>
                            <option value="средний">Средний</option>
                            <option value="большой">Большой</option>
                            <option value="стандартный">Стандартный</option>
                            <option value="детский">Детский</option>
                        </select>
                    </div>

                    <div class="filter-actions">
                        <button class="btn btn-primary" id="applyFiltersBtn"><i class="fas fa-check"></i> Применить</button>
                    </div>
                </aside>

                <!-- Основная область -->
                <section class="catalog-main">
                    <div class="catalog-toolbar">
                        <div class="toolbar-left">
                            <span class="found-count" id="foundCount">Найдено: 0</span>
                            <select id="sortSelect">
                                <option value="popular">По популярности</option>
                                <option value="price-asc">Цена: по возрастанию</option>
                                <option value="price-desc">Цена: по убыванию</option>
                                <option value="new">По новизне</option>
                            </select>
                        </div>
                        <div class="toolbar-right">
                            <div class="view-toggle">
                                <button id="gridViewBtn" class="active" title="Сетка"><i class="fas fa-th"></i></button>
                                <button id="listViewBtn" title="Список"><i class="fas fa-list"></i></button>
                            </div>
                        </div>
                    </div>

                    <!-- Сетка товаров -->
                    <div class="products-grid" id="productsGrid"></div>

                    <!-- Пагинация -->
                    <div class="pagination-wrap" id="paginationWrap"></div>
                </section>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 Похоронный дом «Душа» — организация традиционных похорон с душой и заботой. Все права защищены.</p>
            <p style="margin-top: 10px;"><i class="fas fa-heart" style="color: #c6dbff;"></i> Работаем бережно, чтим традиции</p>
        </div>
    </footer>

    <script>
        // ---------- ДАННЫЕ ТОВАРОВ (28 товаров) с полем inStock ----------
        const products = [
            { id: 1, name: 'Гроб сосновый полированный', description: 'Сосна, лак, стандартный размер', price: 8500, category: 'гробы', material: 'дерево', size: 'стандартный', rating: 4.5, image: 'fa-solid fa-box', date: '2026-01-10', inStock: true },

            { id: 24, name: 'Одежда детская', description: 'Платье/костюм для ребёнка', price: 4200, category: 'одежда для усопших', material: 'искусственные', size: 'детский', rating: 4.3, image: 'fa-solid fa-child', date: '2026-01-05', inStock: false },
            { id: 25, name: 'Гроб лакированный', description: 'Берёза, глянец', price: 9300, category: 'гробы', material: 'дерево', size: 'стандартный', rating: 4.4, image: 'fa-solid fa-box', date: '2026-03-12', inStock: true },
            { id: 26, name: 'Памятник мраморный двойной', description: 'Белый мрамор, два места', price: 66000, category: 'памятники', material: 'мрамор', size: 'большой', rating: 4.8, image: 'fa-solid fa-gem', date: '2026-02-16', inStock: true },
            { id: 27, name: 'Табличка гранитная', description: 'Гранит, гравировка', price: 2900, category: 'кресты и таблички', material: 'гранит', size: 'маленький', rating: 4.2, image: 'fa-solid fa-id-card', date: '2026-01-08', inStock: true },
            { id: 28, name: 'Набор поминальный', description: 'Посуда, скатерть, свечи', price: 4100, category: 'ритуальные принадлежности', material: 'искусственные', size: 'средний', rating: 4.0, image: 'fa-solid fa-utensils', date: '2026-03-03', inStock: true }
        ];

        // ---------- СОСТОЯНИЕ ----------
        let currentProducts = [...products];
        let currentPage = 1;
        const perPage = 6;
        let currentView = 'grid';

        const grid = document.getElementById('productsGrid');
        const paginationWrap = document.getElementById('paginationWrap');
        const foundCount = document.getElementById('foundCount');
        const categoryFilter = document.getElementById('categoryFilter');
        const priceFrom = document.getElementById('priceFrom');
        const priceTo = document.getElementById('priceTo');
        const materialFilter = document.getElementById('materialFilter');
        const sizeFilter = document.getElementById('sizeFilter');
        const sortSelect = document.getElementById('sortSelect');
        const applyBtn = document.getElementById('applyFiltersBtn');
        const resetBtn = document.getElementById('resetFiltersBtn');
        const gridViewBtn = document.getElementById('gridViewBtn');
        const listViewBtn = document.getElementById('listViewBtn');
        const mobileToggle = document.getElementById('mobileFilterToggle');
        const sidebar = document.getElementById('filtersSidebar');

        // ---------- ФИЛЬТРАЦИЯ ----------
        function filterProducts() {
            const cat = categoryFilter.value;
            const mat = materialFilter.value;
            const sz = sizeFilter.value;
            const from = parseFloat(priceFrom.value) || 0;
            const to = parseFloat(priceTo.value) || Infinity;

            currentProducts = products.filter(p => {
                const matchCat = cat === 'all' || p.category === cat;
                const matchMat = mat === 'all' || p.material === mat;
                const matchSize = sz === 'all' || p.size === sz;
                const matchPrice = p.price >= from && p.price <= to;
                return matchCat && matchMat && matchSize && matchPrice;
            });

            sortProducts();
            currentPage = 1;
            render();
        }

        function sortProducts() {
            const sortBy = sortSelect.value;
            switch (sortBy) {
                case 'popular':
                    currentProducts.sort((a, b) => b.rating - a.rating);
                    break;
                case 'price-asc':
                    currentProducts.sort((a, b) => a.price - b.price);
                    break;
                case 'price-desc':
                    currentProducts.sort((a, b) => b.price - a.price);
                    break;
                case 'new':
                    currentProducts.sort((a, b) => new Date(b.date) - new Date(a.date));
                    break;
                default:
                    break;
            }
        }

        function resetFilters() {
            categoryFilter.value = 'all';
            priceFrom.value = '';
            priceTo.value = '';
            materialFilter.value = 'all';
            sizeFilter.value = 'all';
            sortSelect.value = 'popular';
            filterProducts();
        }

        // ---------- ОТРИСОВКА ----------
        function render() {
            const start = (currentPage - 1) * perPage;
            const end = start + perPage;
            const pageItems = currentProducts.slice(start, end);
            const total = currentProducts.length;

            foundCount.textContent = `Найдено: ${total}`;

            grid.innerHTML = '';
            if (pageItems.length === 0) {
                grid.innerHTML =
                    `<p style="grid-column:1/-1; text-align:center; padding:3rem; opacity:0.6;">Ничего не найдено. Попробуйте изменить фильтры.</p>`;
            } else {
                pageItems.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'glass-card product-card';

                    // Плашка "Нет в наличии" (если товара нет)
                    if (!p.inStock) {
                        const outBadge = document.createElement('span');
                        outBadge.className = 'badge badge-out-of-stock';
                        outBadge.textContent = 'Нет в наличии';
                        card.appendChild(outBadge);
                    } else if (p.rating >= 4.7) {
                        // Иначе если популярный (рейтинг высокий) – плашка "Популярное"
                        const popBadge = document.createElement('span');
                        popBadge.className = 'badge';
                        popBadge.textContent = 'Популярное';
                        card.appendChild(popBadge);
                    }

                    const iconClass = p.image || 'fa-solid fa-box';
                    card.innerHTML += `
                        <div class="icon-wrap"><i class="${iconClass}"></i></div>
                        <div class="info">
                            <h4>${p.name}</h4>
                            <div class="desc">${p.description}</div>
                            <div class="price">${p.price.toLocaleString()} ₽</div>
                            <button class="btn btn-primary btn-sm" onclick="alert('Заказ товара: ${p.name}')">
                                <i class="fas fa-shopping-cart"></i> Заказать
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }

            // Пагинация
            const totalPages = Math.ceil(total / perPage);
            paginationWrap.innerHTML = '';
            if (totalPages > 1) {
                const prev = document.createElement('button');
                prev.innerHTML = '«';
                prev.disabled = currentPage === 1;
                prev.addEventListener('click', () => { if (currentPage > 1) { currentPage--;
                        render(); } });
                paginationWrap.appendChild(prev);

                for (let i = 1; i <= totalPages; i++) {
                    const btn = document.createElement('button');
                    btn.textContent = i;
                    if (i === currentPage) btn.className = 'active';
                    btn.addEventListener('click', () => { currentPage = i;
                        render(); });
                    paginationWrap.appendChild(btn);
                }

                const next = document.createElement('button');
                next.innerHTML = '»';
                next.disabled = currentPage === totalPages;
                next.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++;
                        render(); } });
                paginationWrap.appendChild(next);
            }

            grid.className = 'products-grid' + (currentView === 'list' ? ' list-view' : '');
        }

        // ---------- ПЕРЕКЛЮЧЕНИЕ ВИДА ----------
        gridViewBtn.addEventListener('click', () => {
            currentView = 'grid';
            gridViewBtn.className = 'active';
            listViewBtn.className = '';
            render();
        });
        listViewBtn.addEventListener('click', () => {
            currentView = 'list';
            listViewBtn.className = 'active';
            gridViewBtn.className = '';
            render();
        });

        // ---------- СОБЫТИЯ ----------
        applyBtn.addEventListener('click', filterProducts);
        resetBtn.addEventListener('click', resetFilters);
        sortSelect.addEventListener('change', filterProducts);

        mobileToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
        });

        priceFrom.addEventListener('keydown', (e) => { if (e.key === 'Enter') filterProducts(); });
        priceTo.addEventListener('keydown', (e) => { if (e.key === 'Enter') filterProducts(); });

        // Инициализация
        resetFilters();

        // Плавный скролл для якорных ссылок
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                const targetId = this.getAttribute('href');
                if (targetId && targetId.startsWith('#')) {
                    e.preventDefault();
                    const targetElement = document.querySelector(targetId);
                    if (targetElement) {
                        targetElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }
            });
        });

        // Эффект "жидкого стекла" на карточках
        document.querySelectorAll('.glass-card').forEach(card => {
            card.addEventListener('mousemove', function(e) {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const xPercent = (x / rect.width) * 100;
                const yPercent = (y / rect.height) * 100;
                card.style.background =
                    `radial-gradient(circle at ${xPercent}% ${yPercent}%, rgba(255, 255, 250, 0.2), rgba(20, 30, 45, 0.65))`;
            });
            card.addEventListener('mouseleave', function() {
                card.style.background = '';
            });
        });
    </script>
